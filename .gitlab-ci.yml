before_script:
    - echo "Starting CI/CD pipeline for NAA communication prototype"
    - apt-get update && apt-get -y install git cmake librdmacm-dev libibverbs1 ibverbs-utils gcc-13 g++-13

stages:
    - build
    - run
    - deploy
    - measurement
    - evaluation

variables:
  GIT_STRATEGY: clone
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_UPDATE_FLAGS: --jobs 8
  CC: gcc-13
  CXX: g++-13

build:
  stage: build
  tags:
      - naaice2-runner
  interruptible: true
  script:
      - bash ./tests/ci-build.sh
  artifacts:
      paths:
          - build/
      expire_in: 1 hour

run_server:
    stage: run
    dependencies:
        - build
    timeout: 10 minutes
    script:
        - echo "Start SWNAA"
        - apt-get update
        - ./build/examples/naaice_server
    tags:
        - naaice2-runner

run_client:
    stage: run
    dependencies:
        - build
    script:
        - bash ./tests/run_client.sh
    tags:
        - naaice1-runner


pages:
  image: python:3.12-slim
  stage: deploy
  script:
    - apt-get update && apt-get install -y doxygen make graphviz
    - pip install sphinx breathe sphinx_rtd_theme
    - cd docs
    - doxygen Doxyfile
    - make html
    - cd ..
    - mkdir public
    - mv docs/build/html/* public/

  artifacts:
    paths:
      - public

measurement_server:
    stage: measurement
    dependencies:
        - build
    script:
        - echo "Start SWNAA"
        - apt-get update
        - apt-get install -y python3 python3-pip python3-venv
        - python3 -m venv venv
        - . venv/bin/activate
        - pip install numpy tenacity
        - venv/bin/python tests/do_server.py

    tags:
        - naaice2-runner

measurement_client:
    stage: measurement
    dependencies:
        - build
    script:
        - echo "Start SWNAA "
        - apt-get update
        - apt-get install -y python3 python3-pip python3-venv
        - python3 -m venv venv
        - . venv/bin/activate
        - pip install numpy tenacity
        - venv/bin/python tests/do_client.py

    artifacts:
        paths:
            - output.csv
        expire_in: 1 hour
        when: always

    tags:
        - naaice1-runner

evaluation:
    stage: evaluation
    dependencies:
        - measurement_client
    script:
        - apt-get update
        - apt-get install -y python3 python3-pip python3-venv
        - python3 -m venv venv
        - . venv/bin/activate
        - pip install numpy tenacity pandas matplotlib
        - venv/bin/python tests/evaluation.py
    artifacts:
        paths:
            - reference_vs_measurements.pdf
        when: always
        access: all
        expire_in: 4 weeks
    tags:
        - naaice1-runner

  # rules:
  #   - if: '$CI_COMMIT_BRANCH == "main"'

